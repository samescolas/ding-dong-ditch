services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4280:3000"
    volumes:
      - recordings:/recordings
      - ring-config:/app/config
    environment:
      NODE_ENV: production
      RECORDINGS_PATH: /recordings
      CONFIG_PATH: /app/config
      UI_PASSWORD: ${UI_PASSWORD:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      # S3_BUCKET: ${S3_BUCKET:-}
      # S3_REGION: ${S3_REGION:-us-east-1}
      # S3_ENDPOINT: ${S3_ENDPOINT:-}
      # S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      # S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      # S3_PREFIX: ${S3_PREFIX:-}
      # MQTT integration (for Home Assistant)
      # MQTT_ENABLED: "true"
      # MQTT_BROKER: mqtt://emqx:1883
      # MQTT_TOPIC_PREFIX: dingdongditch
      # MQTT_DISCOVERY_PREFIX: homeassistant
      # AI Vision Description (optional)
      # AI_ENABLED: "false"
      # AI_API_URL: http://localhost:8080/v1
      # AI_API_KEY: ""
      # AI_MODEL: gpt-4o
      # AI_PROMPT: "Describe what you see in this security camera image in one concise sentence."
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - frontend

  # Optional: Cloudflare Tunnel for remote access
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env to enable
  # Start with: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - frontend
    profiles:
      - tunnel

volumes:
  recordings:
  ring-config:

networks:
  frontend:
